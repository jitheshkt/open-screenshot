<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit · Open Screenshot</title>
    <link rel="stylesheet" href="./editor.css" />
  </head>
  <body>
    <div class="app">
      <!-- Options panel + sticky export bar -->
      <aside class="panel">
        <div id="panel" class="panel__scroll"></div>
        <div class="panel__footer">
          <button id="reset" class="link-btn" type="button">Reset all</button>
          <button id="upload" class="btn btn--ghost" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
            <span>Upload Image</span>
          </button>
          <input id="filename" class="text-input" type="text" placeholder="Optional filename (default: open-screenshot)" />
          <div class="export-row">
            <button id="download" class="btn btn--primary" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
              <span>Download</span>
            </button>
            <button id="copy" class="btn btn--accent" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
              <span>Copy</span>
            </button>
          </div>
        </div>
      </aside>

      <!-- Canvas stage -->
      <section class="stage">
        <div class="stage__inner">
          <canvas id="canvas" class="canvas" hidden></canvas>
          <p id="empty" class="empty">
            No image yet. Take a screenshot from the toolbar, or
            <button id="empty-upload" class="link-btn" type="button">upload one</button>.
          </p>
        </div>
      </section>
    </div>

    <input id="file" type="file" accept="image/*" hidden />
    <script type="module" src="./main.ts"></script>
  </body>
</html>
