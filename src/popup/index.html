<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Screenshot</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="header">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2" />
          <path d="M17 3h2a2 2 0 0 1 2 2v2" />
          <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
          <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
          <circle cx="12" cy="12" r="2.5" />
        </svg>
      </span>
      <h1>Open Screenshot</h1>
    </header>

    <main class="actions">
      <button class="action" data-mode="visible">
        <span class="action__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="14" x="2" y="3" rx="2" />
            <line x1="8" x2="16" y1="21" y2="21" />
            <line x1="12" x2="12" y1="17" y2="21" />
          </svg>
        </span>
        <span class="action__label">
          <strong>Visible area</strong>
          <small>Capture what you see now · Alt+Shift+V</small>
        </span>
      </button>

      <button class="action" data-mode="fullpage">
        <span class="action__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4" />
            <path d="M14 2v4a2 2 0 0 0 2 2h4" />
            <path d="M2 15h10" />
            <path d="m9 18 3-3-3-3" />
          </svg>
        </span>
        <span class="action__label">
          <strong>Full page</strong>
          <small>Scroll and stitch · Alt+Shift+F</small>
        </span>
      </button>

      <button class="action" data-mode="selection">
        <span class="action__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 3a2 2 0 0 0-2 2" />
            <path d="M19 3a2 2 0 0 1 2 2" />
            <path d="M21 19a2 2 0 0 1-2 2" />
            <path d="M5 21a2 2 0 0 1-2-2" />
            <path d="M9 3h1" /><path d="M9 21h1" />
            <path d="M14 3h1" /><path d="M14 21h1" />
            <path d="M3 9v1" /><path d="M21 9v1" />
            <path d="M3 14v1" /><path d="M21 14v1" />
          </svg>
        </span>
        <span class="action__label">
          <strong>Selection</strong>
          <small>Pick a region to capture · Alt+Shift+S</small>
        </span>
      </button>
    </main>

    <footer class="footer">
      <span id="status" class="status"></span>
      <a
        class="footer__link"
        href="https://github.com/"
        target="_blank"
        rel="noreferrer"
        >Open source ↗</a
      >
    </footer>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
